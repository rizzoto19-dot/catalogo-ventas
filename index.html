<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#0f172a}
.top-bar{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);color:#fff;padding:16px 0;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.top-bar h1{font-size:1.4rem;font-weight:800;margin:0;letter-spacing:-.5px}
.top-bar .sub{font-size:.75rem;opacity:.7;margin-top:2px}
.search-box{position:relative;max-width:400px;margin:12px auto 0}
.search-box input{width:100%;padding:10px 16px 10px 42px;border-radius:100px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);color:#fff;font-size:.9rem;outline:none;transition:all .3s}
.search-box input::placeholder{color:rgba(255,255,255,.5)}
.search-box input:focus{border-color:#60a5fa;background:rgba(255,255,255,.15)}
.search-box i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);font-size:1rem}
.categories{display:flex;gap:8px;padding:16px 0;flex-wrap:wrap}
.cat-btn{flex-shrink:0;padding:8px 20px;border-radius:100px;border:1.5px solid #e2e8f0;background:#fff;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .3s;color:#475569;white-space:nowrap}
.cat-btn:hover{border-color:#60a5fa;color:#2563eb;background:#eff6ff}
.cat-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 0 80px}
.product-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04);transition:all .3s;border:1px solid #f1f5f9;cursor:pointer}
.product-card:hover{transform:translateY(-6px);box-shadow:0 16px 32px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.06);border-color:#e2e8f0}
.product-img{width:100%;height:220px;object-fit:cover;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:3rem;color:#cbd5e1;border-bottom:1px solid #f1f5f9}
.product-info{padding:16px}
.product-category{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#60a5fa;margin-bottom:4px}
.product-name{font-size:.95rem;font-weight:700;color:#0f172a;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-brand{font-size:.85rem;color:#94a3b8;margin-bottom:8px}
.product-price-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.product-price{font-size:1.35rem;font-weight:800;color:#2563eb;letter-spacing:-.3px}
.price-original{font-size:.75rem;color:#94a3b8;text-decoration:line-through;font-weight:500}
.price-sale{font-size:1.35rem;font-weight:800;color:#dc2626;letter-spacing:-.3px}
.price-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.product-stock{font-size:.7rem;padding:4px 12px;border-radius:100px;font-weight:600;white-space:nowrap}
.stock-ok{background:#dcfce7;color:#16a34a}
.stock-low{background:#fef3c7;color:#d97706}
.stock-out{background:#f43f5e;color:#fff}
.sold-badge{position:absolute;top:12px;right:12px;background:#64748b;color:#fff;font-size:.65rem;font-weight:700;padding:4px 12px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;z-index:2;box-shadow:0 2px 8px rgba(100,116,139,.3)}
.product-card.sold{opacity:.6}
.product-card.sold .product-img{filter:grayscale(1)}
.sale-badge{position:absolute;top:12px;left:12px;background:#dc2626;color:#fff;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:6px;z-index:2;box-shadow:0 2px 8px rgba(220,38,38,.3)}
.whatsapp-float{position:fixed;bottom:24px;right:24px;z-index:999;background:#25D366;color:#fff;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 4px 16px rgba(37,211,102,.4);transition:all .3s;text-decoration:none}
.whatsapp-float:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(37,211,102,.5);color:#fff}
.whatsapp-float small{position:absolute;right:62px;background:#1e293b;color:#fff;padding:6px 14px;border-radius:8px;font-size:.75rem;font-weight:600;white-space:nowrap;opacity:0;transition:all .3s;pointer-events:none}
.whatsapp-float:hover small{opacity:1}
.loader{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s}
.loader .spinner{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{margin-top:16px;font-size:.9rem;color:#64748b;font-weight:500}
.error-msg{text-align:center;padding:60px 20px;color:#64748b}
.error-msg i{font-size:3rem;color:#94a3b8;margin-bottom:16px}
.error-msg h5{font-weight:700;color:#334155}
.footer-bar{background:#fff;border-top:1px solid #f1f5f9;padding:16px 0;text-align:center;font-size:.8rem;color:#94a3b8}
.count-badge{font-size:.75rem;color:#64748b;margin-left:8px;font-weight:400}
.modal-product-img{width:100%;max-height:500px;object-fit:contain;border-radius:12px;background:#f8fafc}
@media(max-width:768px){
.top-bar h1{font-size:1.15rem}
.search-box{max-width:100%}
.products-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.product-img{height:140px;font-size:2rem}
.product-info{padding:12px}
.product-name{font-size:.85rem}
.product-price{font-size:1.1rem}
.whatsapp-float{width:50px;height:50px;font-size:1.3rem}
.whatsapp-float small{display:none}
}
</style>
</head>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <p>Cargando catálogo...</p>
</div>

<div class="top-bar">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <h1 id="storeName"><i class="bi bi-shop me-2"></i>Mi Tienda</h1>
        <div class="sub" id="storeSub">Catálogo de productos</div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span id="trmBadge" class="text-white-50 d-none d-sm-inline" style="font-size:.75rem;font-weight:500">TRM: $4,150</span>
        <a href="#" id="whatsappHeader" class="text-white text-decoration-none d-flex align-items-center gap-2" style="font-size:.85rem;font-weight:600" target="_blank">
          <i class="bi bi-whatsapp" style="font-size:1.3rem;color:#25D366"></i>
          <span class="d-none d-sm-inline">Contáctanos</span>
        </a>
      </div>
    </div>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar productos..." oninput="filterProducts()">
    </div>
  </div>
</div>

<div class="container">
  <div class="categories" id="categoriesContainer"></div>
  <div id="errorContainer" class="error-msg" style="display:none">
    <i class="bi bi-emoji-frown"></i>
    <h5>No pudimos cargar los productos</h5>
    <p class="mb-0">Verifica la conexión o intenta más tarde.</p>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<a class="whatsapp-float" id="whatsappFloat" href="#" target="_blank">
  <i class="bi bi-whatsapp"></i>
  <small>Pedidos por WhatsApp</small>
</a>

<div class="footer-bar">
  <div class="container">
    &copy; 2025 <span id="footerStore">Mi Tienda</span> &mdash; Catálogo en línea
  </div>
</div>

<!-- Modal detalle producto -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content" style="border-radius:16px;border:none">
      <div class="modal-body p-4">
        <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal"></button>
        <div id="modalContent"></div>
      </div>
    </div>
  </div>
</div>

document.addEventListener('DOMContentLoaded',function(){
allProducts=PRODUCTS.map(function(x){return{name:x.n,category:x.c,price:x.p,image:x.i,images:[x.i,x.i2,x.i3].filter(function(u){return u&&u!=='';}),description:x.d,link:x.l,discount:x.dc||0,stock:x.s!==undefined?x.s:-1,size:x.t||''};});
fetch('https://api.exchangerate-api.com/v4/latest/USD').then(function(r){return r.json();}).then(function(d){if(d.rates.COP){CONFIG.trm=Math.round(d.rates.COP);var e=document.getElementById('trmBadge');if(e)e.textContent='TRM: $'+CONFIG.trm.toLocaleString('es-CO');filterProducts();}}).catch(function(){});
render();});

function render(){
document.getElementById('storeName').textContent=CONFIG.storeName;
document.getElementById('storeSub').textContent=CONFIG.storeSub;
document.getElementById('footerStore').textContent=CONFIG.storeName;
var wa=CONFIG.whatsapp.replace(/[^0-9]/g,'');
var waUrl='https://wa.me/'+wa+'?text=Hola!%20Quisiera%20informaci\u00F3n%20sobre%20sus%20productos';
document.getElementById('whatsappHeader').href=waUrl;
document.getElementById('whatsappFloat').href=waUrl;
var cats=[...new Set(allProducts.map(function(p){return p.category;}))].sort();
var catContainer=document.getElementById('categoriesContainer');
catContainer.innerHTML='<button class="cat-btn active" onclick="setCategory(\'todas\')">Todas <span class="count-badge">'+allProducts.length+'</span></button>'+
cats.map(function(c){var count=allProducts.filter(function(p){return p.category===c;}).length;return '<button class="cat-btn" onclick="setCategory(\''+c.replace(/'/g,"\\'")+'\')">'+c+' <span class="count-badge">'+count+'</span></button>';}).join('');
document.getElementById('loader').style.opacity='0';
setTimeout(function(){document.getElementById('loader').style.display='none';},500);
filterProducts();}

function setCategory(cat){currentCategory=cat;
document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.toggle('active',b.textContent.trim().startsWith(cat==='todas'?'Todas':cat));});
filterProducts();}

function filterProducts(){
var q=document.getElementById('searchInput').value.toLowerCase().trim();
var filtered=allProducts;
if(currentCategory!=='todas')filtered=filtered.filter(function(p){return p.category===currentCategory;});
if(q)filtered=filtered.filter(function(p){return p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||(p.description&&p.description.toLowerCase().includes(q));});
var grid=document.getElementById('productsGrid');
if(filtered.length===0){grid.innerHTML='<div class="error-msg" style="grid-column:1/-1"><i class="bi bi-search"></i><h5>Sin resultados</h5><p class="mb-0">No encontramos productos con esa b\u00FAsqueda</p></div>';return;}
var cur=CONFIG.currency,sfx=CONFIG.currencySuffix,trm=(CONFIG.trm||1)*CONFIG.trmMargin,fmt=CONFIG.locale?new Intl.NumberFormat(CONFIG.locale):null;
var ff=function(n){return fmt?fmt.format(Math.round(n)):Math.round(n).toString();};
grid.innerHTML=filtered.map(function(p){
var sold=p.stock===0;
var isSale=p.discount>0;
var salePrice=p.price*(1-p.discount/100);
var imgHtml=p.image?'<img class="product-img" src="'+p.image+'" alt="'+p.name+'" loading="lazy" onerror="this.style.display=\'none\'">':'<div class="product-img"><i class="bi bi-box-seam"></i></div>';
var badges='';
if(sold)badges+='<div class="sold-badge">Vendido</div>';
else if(isSale)badges+='<div class="sale-badge">-'+p.discount+'%</div>';
var priceHtml=isSale?'<span class="price-original">'+cur+ff(psychPrice(p.price*trm))+'</span> <span class="price-sale">'+cur+ff(psychPrice(salePrice*trm))+'</span>':'<span class="product-price">'+cur+ff(psychPrice(p.price*trm))+'</span>';
var stockHtml='';
if(p.stock>=0){if(p.stock===0)stockHtml='<span class="product-stock stock-out">Agotado</span>';else if(p.stock<=5)stockHtml='<span class="product-stock stock-low">Quedan '+p.stock+'</span>';else stockHtml='<span class="product-stock stock-ok">Disponible</span>';}
var desc=p.description?p.description.replace(/<[^>]*>/g,'').substring(0,80)+'...':'';
var sizeHtml=p.size?'<div class="product-brand">Talla: '+p.size+'</div>':'';
return '<div class="product-card'+(sold?' sold':'')+'" onclick="showProduct('+allProducts.indexOf(p)+')"><div style="position:relative">'+imgHtml+badges+'</div><div class="product-info"><div class="product-category">'+p.category+'</div><div class="product-name">'+p.name+'</div>'+sizeHtml+(desc?'<div class="product-brand">'+desc+'</div>':'')+'<div class="product-price-row"><div class="price-row">'+priceHtml+'</div>'+stockHtml+'</div></div></div>';}).join('');}

function showProduct(idx){
var p=allProducts[idx];if(!p)return;
var cur=CONFIG.currency,sfx=CONFIG.currencySuffix,trm=(CONFIG.trm||1)*CONFIG.trmMargin,fmt=CONFIG.locale?new Intl.NumberFormat(CONFIG.locale):null;
var ff=function(n){return fmt?fmt.format(Math.round(n)):Math.round(n).toString();};
var pc=p.price*trm;
var isSale=p.discount>0;
var salePrice=p.price*(1-p.discount/100);
var priceHtml=isSale?'<span class="price-original" style="font-size:1.2rem">'+cur+ff(psychPrice(pc))+sfx+'</span> <span class="price-sale" style="font-size:1.8rem">'+cur+ff(psychPrice(salePrice*trm))+sfx+'</span>':'<span style="font-size:1.8rem;font-weight:800;color:#2563eb">'+cur+ff(psychPrice(pc))+sfx+'</span>';
var sold=p.stock===0;
var wa=CONFIG.whatsapp.replace(/[^0-9]/g,'');
var wu='https://wa.me/'+wa+'?text='+encodeURIComponent('Hola! Quiero comprar: '+p.name+' ('+cur+ff(psychPrice(isSale?salePrice*trm:pc))+sfx+')');
var imgs=p.images&&p.images.length>0?p.images:[null];
var currentImg=0;
var imgHtml=imgs[0]?'<img class="modal-product-img mb-2" src="'+imgs[0]+'" alt="'+p.name+'" id="modalMainImg">':'<div class="modal-product-img mb-2 d-flex align-items-center justify-content-center" style="font-size:4rem;color:#cbd5e1"><i class="bi bi-box-seam"></i></div>';
var thumbs=imgs.length>1?'<div class="d-flex gap-2 mb-3 overflow-auto" style="justify-content:center">'+imgs.map(function(u,i){return '<img src="'+u+'" onclick="switchImage(\''+u+'\',this)" class="gallery-thumb" style="width:60px;height:60px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid '+(i===0?'#2563eb':'#e2e8f0')+';transition:all .2s">';}).join('')+'</div>':'';
var img=imgHtml;
var stockHtml='';
if(p.stock>=0){if(p.stock===0)stockHtml='<div class="mb-2"><span class="product-stock stock-out" style="font-size:.85rem;padding:6px 16px">Agotado</span></div>';else if(p.stock<=5)stockHtml='<div class="mb-2"><span class="product-stock stock-low" style="font-size:.85rem;padding:6px 16px">Quedan '+p.stock+' unidades</span></div>';else stockHtml='<div class="mb-2"><span class="product-stock stock-ok" style="font-size:.85rem;padding:6px 16px">Disponible</span></div>';}
var dh=p.description?'<div class="mb-3" style="font-size:.85rem;color:#475569;line-height:1.6;max-height:200px;overflow-y:auto">'+p.description+'</div>':'';
var lh=p.link?'<a href="'+p.link+'" target="_blank" class="btn btn-outline-secondary w-100 py-2 mb-2 fw-bold" style="border-radius:12px"><i class="bi bi-box-arrow-up-right me-2"></i>Ver en Amazon</a>':'';
var btnHtml=sold?'<button class="btn w-100 py-2 fw-bold" style="border-radius:12px;background:#e2e8f0;border:none;color:#94a3b8;cursor:not-allowed" disabled>Agotado</button>':'<a href="'+wu+'" target="_blank" class="btn btn-success w-100 py-2 fw-bold" style="border-radius:12px;background:#25D366;border-color:#25D366"><i class="bi bi-whatsapp me-2"></i>Comprar por WhatsApp</a>';
var sizeHtml=p.size?'<div class="mb-2" style="font-size:1.1rem;font-weight:600;color:#475569"><i class="bi bi-rulers me-1"></i>Talla: '+p.size+'</div>':'';
document.getElementById('modalContent').innerHTML=img+thumbs+'<div class="product-category mb-1">'+p.category+'</div><h4 class="fw-bold mb-1">'+p.name+'</h4>'+sizeHtml+stockHtml+priceHtml+dh+lh+btnHtml;
new bootstrap.Modal(document.getElementById('productModal')).show();}
function switchImage(url,el){var m=document.getElementById('modalMainImg');if(m)m.src=url;document.querySelectorAll('.gallery-thumb').forEach(function(t){t.style.borderColor='#e2e8f0';});if(el)el.style.borderColor='#2563eb';}
</script>
